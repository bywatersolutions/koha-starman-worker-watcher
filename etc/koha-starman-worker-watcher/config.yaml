# koha-starman-worker-watcher configuration
#
# This file is a dpkg conffile: local edits survive package upgrades.
# Restart the service after changing it:
#   systemctl restart koha-starman-worker-watcher

# How often the daemon rescans /proc for Starman workers.
poll_interval_seconds: 10

# Thresholds are evaluated with AND logic: a worker must exceed BOTH
# runtime_threshold_seconds AND memory_threshold_mb at the same scan
# pass for an alert to fire. Crossing only one threshold is ignored.
# The daemon fires exactly one alert per (PID, lifetime); it will not
# re-alert on the same worker again unless that worker dies and the
# same PID number is reused by a fresh process.

# Minimum worker runtime in seconds before it becomes eligible for alerting.
runtime_threshold_seconds: 300

# Minimum worker resident RAM (RSS, from /proc/<pid>/status VmRSS) in
# mebibytes before it becomes eligible for alerting. Swap is reported
# alongside in the Slack payload for context but does not itself
# participate in the threshold check.
memory_threshold_mb: 1024

# Auto-kill thresholds (optional, both default unset = disabled).
#
# When at least one of these is set, the daemon will SIGTERM (and on a
# subsequent scan, SIGKILL) any worker that exceeds them. Both thresholds
# are ANDed at evaluation time, but an unset threshold is treated as a
# wildcard — set just one if you only want to kill on that dimension.
#
# These are independent of the alert thresholds above. In practice you
# will normally set them HIGHER than the alert thresholds so that you
# get a Slack alert first and only kill workers that are clearly stuck
# or leaking. A Slack notice is also posted for every signal sent.
#
# kill_runtime_threshold_seconds: 1800
# kill_memory_threshold_mb: 4096

capture:
  # When true, attach strace to the offending PID for duration_seconds as
  # soon as an alert fires, compress the output with streaming gzip, and
  # include the last attach_tail_lines lines in the Slack message.
  #
  # NOTE: strace will noticeably slow the traced worker for the capture
  # window (especially on I/O-heavy workers). This is generally acceptable
  # because the worker is already over threshold, but set enabled: false
  # if you would rather not take the hit.
  enabled: true
  duration_seconds: 5
  output_dir: /var/lib/koha-starman-worker-watcher/captures
  # Keep at most this many *.strace.gz files in output_dir; older files
  # are unlinked after each new capture.
  keep: 50
  attach_tail_lines: 40

slack:
  # Set to false for log-only operation: alerts are still computed,
  # captures are still written, and the full formatted alert text is
  # still logged to journald (prefixed "[log-only slack]"), but nothing
  # is POSTed to Slack and webhook_url is not required. Useful for
  # testing, air-gapped hosts, or teams that prefer to scrape journald.
  enabled: true

  # Incoming webhook URL. Required when enabled is true — the daemon
  # will refuse to start unless this is set (or --dry-run is passed).
  webhook_url: ""
  username: koha-worker-watcher
  icon_emoji: ":rotating_light:"

# Basenames or full paths of scripts that should never trigger a runtime
# alert. Typical candidates: long-running report generators.
ignore_scripts: []

# Koha instance names (as parsed from /etc/koha/sites/<name>/koha-conf.xml)
# to ignore entirely.
ignore_instances: []
