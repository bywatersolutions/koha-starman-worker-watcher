# koha-starman-worker-watcher configuration
#
# This file is a dpkg conffile: local edits survive package upgrades.
# Restart the service after changing it:
#   systemctl restart koha-starman-worker-watcher

# How often the daemon rescans /proc for Starman workers.
poll_interval_seconds: 10

# Minimum worker resident RAM (RSS, from /proc/<pid>/status VmRSS) in
# mebibytes before it becomes eligible for alerting. A worker that
# exceeds this value fires exactly one Slack alert per (PID, lifetime);
# it will not re-alert on the same worker again unless that worker dies
# and the same PID number is reused by a fresh process. Swap is reported
# in the Slack payload for context but is not itself a trigger.
memory_threshold_mb: 1024

# Auto-kill thresholds (optional, both default unset = disabled).
#
# kill_runtime_threshold_seconds is a DWELL time: a worker must sustain
# RSS above memory_threshold_mb for this many seconds before it is
# killed. If the worker drops back below memory_threshold_mb at any
# point, the dwell clock resets.
#
# kill_memory_threshold_mb, if set, is an additional current-RSS bar
# that must ALSO be exceeded at kill time (ANDed with the dwell check).
# Use it when you want the dwell to apply only to the most egregious
# workers — e.g. "killed only after 30 min over 1 GiB AND currently
# also over 4 GiB". If unset, the dwell check alone decides the kill.
#
# Kill is enabled when either value is set. A Slack notice is posted
# for every signal sent. The daemon SIGTERMs first and, if the PID is
# still present on the next scan pass, escalates to SIGKILL.
#
# kill_runtime_threshold_seconds: 1800
# kill_memory_threshold_mb: 4096

capture:
  # When true, on alert the watcher reads /proc/<pid>/{wchan,syscall,
  # stack} and runs `gdb -batch -p <pid> -ex bt -ex detach` against the
  # offending worker. This is a one-shot stack snapshot: the worker is
  # paused for tens of milliseconds (not seconds), well under Apache's
  # ProxyTimeout, so attaching to a healthy-but-busy worker does not
  # cause a 502 in the browser. Output is written to a plain-text
  # .stack.txt file under output_dir; the last tail_lines lines are
  # included inline in the Slack alert.
  enabled: true
  output_dir: /var/lib/koha-starman-worker-watcher/captures
  # Keep at most this many *.stack.txt files in output_dir; older files
  # are unlinked after each new capture.
  keep: 50
  # Seconds to wait on gdb before giving up (process may be unresponsive).
  gdb_timeout: 10
  tail_lines: 40

  # Perl-level stack trace on alert (SIGUSR2 + cooperating handler).
  #
  # WARNING: do not enable this until every instance's plack.psgi has
  # loaded Koha::StarmanWorkerWatcher::Stack and called ->install (see
  # README "Perl-level stack trace on alert"). SIGUSR2's default OS
  # disposition is "terminate the process"; without the handler, every
  # capture would kill the worker it was trying to inspect.
  #
  # When enabled, the watcher sends SIGUSR2 to the target worker, waits
  # up to perl_stack_wait seconds for it to write a Carp::longmess dump
  # to <output_dir>/koha-stack-<pid>.txt, slurps the contents into the
  # capture (and Slack alert tail), and unlinks the file. The cooperating
  # handler reads output_dir from this same config file so both sides
  # always agree on the path.
  perl_stack_signal: false
  perl_stack_wait: 2

slack:
  # Set to false for log-only operation: alerts are still computed,
  # captures are still written, and the full formatted alert text is
  # still logged to journald (prefixed "[log-only slack]"), but nothing
  # is POSTed to Slack and webhook_url is not required. Useful for
  # testing, air-gapped hosts, or teams that prefer to scrape journald.
  enabled: true

  # Incoming webhook URL. Required when enabled is true — the daemon
  # will refuse to start unless this is set (or --dry-run is passed).
  webhook_url: ""
  username: koha-worker-watcher
  icon_emoji: ":rotating_light:"

# Basenames or full paths of scripts that should never trigger an
# alert or kill. Typical candidates: long-running report generators.
ignore_scripts: []

# Koha instance names (as parsed from /etc/koha/sites/<name>/koha-conf.xml)
# to ignore entirely.
ignore_instances: []
